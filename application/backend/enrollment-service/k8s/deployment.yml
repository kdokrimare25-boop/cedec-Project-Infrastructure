apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrollment-service
  labels:
    app: enrollment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enrollment-service
  template:
    metadata:
      labels:
        app: enrollment-service
    spec:
      containers:
        - name: enrollment-service
          image: 439055361064.dkr.ecr.ap-south-1.amazonaws.com/backend/enrollment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: MONGO_URI
              value: "__MONGO_URI__"
            - name: JWT_SECRET
              value: "__JWT_SECRET__"
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: enrollment-service
  labels:
    app: enrollment-service
spec:
  type: ClusterIP
  selector:
    app: enrollment-service
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
