# enrollment-service — build, test, push to ECR, deploy to EKS
#
# GitHub repository secrets — add under Settings → Secrets and variables → Actions
# (NOT the "Agents" tab; Actions workflows cannot read Agents secrets)
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   MONGO_URI
#   JWT_SECRET
#
# Requires in application/backend/enrollment-service/:
#   Dockerfile
#   k8s/deployment.yml (with __MONGO_URI__ and __JWT_SECRET__ placeholders in env values)

name: enrollment-service

on:
  push:
    branches: [main]
    paths:
      - 'application/backend/enrollment-service/**'
      - '.github/workflows/enrollment-service.yml'
  pull_request:
    paths:
      - 'application/backend/enrollment-service/**'
      - '.github/workflows/enrollment-service.yml'
  workflow_dispatch:

env:
  SERVICE_DIR: application/backend/enrollment-service
  ECR_REGISTRY: 439055361064.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE: 439055361064.dkr.ecr.ap-south-1.amazonaws.com/backend/enrollment-service:latest
  ECR_REGION: ap-south-1
  EKS_CLUSTER: cdec-eks-dev
  EKS_REGION: eu-west-1

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: ./mvnw clean test -B

  deploy:
    name: Deploy to EKS
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.ECR_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to EKS
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          aws eks update-kubeconfig --region "${EKS_REGION}" --name "${EKS_CLUSTER}"

          MONGO_URI_ESCAPED=$(echo "${MONGO_URI}" | sed 's/&/\\&/g')
          JWT_SECRET_ESCAPED=$(echo "${JWT_SECRET}" | sed 's/&/\\&/g')
          sed -e "s|__MONGO_URI__|${MONGO_URI_ESCAPED}|g" \
              -e "s|__JWT_SECRET__|${JWT_SECRET_ESCAPED}|g" \
              k8s/deployment.yml > k8s/deployment.generated.yml

          kubectl apply -f k8s/deployment.generated.yml -n default
          kubectl rollout restart deployment/enrollment-service -n default
          kubectl rollout status deployment/enrollment-service -n default --timeout=300s
